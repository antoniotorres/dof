name: 🐛 Bug report
description: Report something that isn't working as expected.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues
        first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I search for "X", the page shows…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Affected URL
      description: The page where you saw the issue.
      placeholder: https://dof.toniotgz.com/notas/...
  - type: dropdown
    id: environment
    attributes:
      label: Where did this happen?
      options:
        - Production (dof.toniotgz.com)
        - Local development
        - Both
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Browser / device / screenshots
      description: Browser + version, OS, device, and any screenshots or console output.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This report contains no secrets or private data.
          required: true
