name: Close stale issues and PRs

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security,dependencies
          stale-issue-message: >
            This issue has had no activity for 60 days and is now marked as
            stale. Comment or remove the `stale` label to keep it open;
            otherwise it will be closed in 14 days.
          stale-pr-message: >
            This pull request has had no activity for 60 days and is now marked
            as stale. Push, comment, or remove the `stale` label to keep it
            open; otherwise it will be closed in 14 days.
          close-issue-message: >
            Closing as stale. Feel free to reopen with updated information.
          close-pr-message: >
            Closing as stale. Feel free to reopen when you'd like to continue.
